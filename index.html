<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Multi-Bot Trading Analytics</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- App Shell -->
  <div id="app-shell">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <button class="logo-btn" id="logoBtn" title="Dashboard Home" aria-label="Navigate to landing page">📊</button>
        <span class="sidebar-title">Trading Analytics</span>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
      </div>

      <!-- Bot Selector -->
      <div class="sidebar-section">
        <label class="sidebar-label" for="botSelect">Bot</label>
        <select id="botSelect" class="sidebar-select">
          <!-- populated by JS -->
        </select>
      </div>

      <!-- Timeframe Selector -->
      <div class="sidebar-section">
        <label class="sidebar-label" for="timeframeSelect">Timeframe</label>
        <select id="timeframeSelect" class="sidebar-select">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>

      <!-- Viz Navigation -->
      <nav class="sidebar-nav" id="vizNav" aria-label="Visualization navigation">
        <div class="sidebar-label">Visualizations</div>
        <a href="#/dashboard" class="nav-item active" data-viz="dashboard">📋 KPI Overview</a>
        <a href="#/viz/equity-curve" class="nav-item" data-viz="equity-curve">📈 Equity Curve</a>
        <a href="#/viz/pnl-by-pair" class="nav-item" data-viz="pnl-by-pair">💱 P&L by Pair</a>
        <a href="#/viz/avg-trade-pnl" class="nav-item" data-viz="avg-trade-pnl">📊 Avg Trade P&L</a>
        <a href="#/viz/max-drawdown" class="nav-item" data-viz="max-drawdown">📉 Max Drawdown</a>
        <a href="#/viz/win-rate" class="nav-item" data-viz="win-rate">🎯 Win Rate</a>
        <a href="#/viz/profit-factor" class="nav-item" data-viz="profit-factor">⚡ Profit Factor</a>
        <a href="#/viz/sharpe" class="nav-item" data-viz="sharpe">📐 Sharpe Ratio</a>
        <a href="#/viz/trade-heatmap" class="nav-item" data-viz="trade-heatmap">🗺️ Trade Heatmap</a>
        <a href="#/compare" class="nav-item nav-item-compare" data-viz="compare">⚖️ Compare Bots</a>
      </nav>

      <!-- Theme Toggle -->
      <div class="sidebar-footer">
        <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
          <span id="themeIcon">☀️</span>
          <span id="themeLabel">Light</span>
        </button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar (mobile hamburger) -->
      <header class="topbar">
        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">☰</button>
        <span class="topbar-title" id="topbarTitle">KPI Overview</span>
      </header>

      <!-- SPA Viewport -->
      <div id="app" class="app-viewport"></div>
    </main>
  </div>

  <!-- Scripts: theme + mock-data loaded synchronously, app.js is SPA controller -->
  <script src="js/theme.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
