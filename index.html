<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Multi-Bot Trading Analytics</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <style>
    /* Critical CSS — inlined for fast FCP */
    :root{--bg-primary:#FAFAF9;--bg-surface:#FFF;--bg-surface-hover:#F5F5F4;--bg-sidebar:#F5F5F4;--border-color:#E7E5E4;--border-light:#F0EEEC;--text-primary:#1C1917;--text-secondary:#78716C;--text-muted:#A8A29E;--accent:#2563EB;--accent-bg:rgba(37,99,235,.08);--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--text-xs:11px;--text-sm:13px;--text-base:15px;--text-lg:18px;--radius:8px;--radius-sm:6px;--sidebar-w:260px;--header-h:52px;--tr:200ms ease-out;--shadow-sm:0 1px 3px rgba(0,0,0,.06)}
    [data-theme="dark"]{--bg-primary:#0C0C0C;--bg-surface:#161616;--bg-surface-hover:#1E1E1E;--bg-sidebar:#111;--border-color:#2A2A2A;--border-light:#1E1E1E;--text-primary:#F5F5F4;--text-secondary:#A8A29E;--text-muted:#6B6B6B;--accent:#60A5FA;--accent-bg:rgba(96,165,250,.12);--shadow-sm:0 1px 3px rgba(0,0,0,.3)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    body{font-family:var(--font-sans);font-size:var(--text-base);color:var(--text-primary);background:var(--bg-primary);line-height:1.5;transition:background var(--tr),color var(--tr);min-height:100vh}
    .sidebar{width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform var(--tr),background var(--tr),border-color var(--tr);overflow-y:auto}
    .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border-color);flex-shrink:0}
    .sidebar-title{font-size:var(--text-sm);font-weight:600;color:var(--text-primary);letter-spacing:-.01em}
    .sidebar-close{display:none;width:32px;height:32px;align-items:center;justify-content:center;background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:18px;border-radius:var(--radius-sm)}
    .sidebar-section{padding:12px;flex-shrink:0}
    .sidebar-label{font-size:var(--text-xs);font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
    .sidebar-select{width:100%;padding:8px 10px;font-size:var(--text-sm);font-family:var(--font-sans);color:var(--text-primary);background:var(--bg-surface);border:1px solid var(--border-color);border-radius:var(--radius-sm);cursor:pointer;appearance:none}
    .sidebar-nav{flex:1;padding:0 8px 12px;overflow-y:auto}
    .nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:var(--text-sm);color:var(--text-secondary);text-decoration:none;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--tr);white-space:nowrap}
    .nav-item:hover{color:var(--text-primary);background:var(--bg-surface-hover)}
    .nav-item.active{color:var(--accent);background:var(--accent-bg);font-weight:500}
    .sidebar-footer{padding:12px;border-top:1px solid var(--border-color);flex-shrink:0}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;opacity:0;pointer-events:none;transition:opacity var(--tr)}
    .sidebar-overlay.active{opacity:1;pointer-events:auto}
    .main-content{flex:1;margin-left:var(--sidebar-w);min-height:100vh;transition:margin-left var(--tr)}
    .topbar{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;height:var(--header-h);padding:0 20px;gap:12px;transition:background var(--tr),border-color var(--tr)}
    .hamburger{display:none;width:36px;height:36px;align-items:center;justify-content:center;background:0;border:0;color:var(--text-secondary);cursor:pointer;font-size:20px;border-radius:var(--radius-sm)}
    .topbar-title{font-size:var(--text-sm);font-weight:600;color:var(--text-primary)}
    #app{padding:20px;max-width:1200px}
    .app-viewport{min-height:60vh}
    @media(max-width:1023px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.sidebar-overlay{display:block}.sidebar-close{display:flex}.hamburger{display:flex}.main-content{margin-left:0}}
  </style>
  <link rel="stylesheet" href="css/styles.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="css/styles.css"></noscript>
</head>
<body>
  <!-- App Shell -->
  <div id="app-shell">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <button class="logo-btn" id="logoBtn" title="Dashboard Home" aria-label="Navigate to landing page">📊</button>
        <span class="sidebar-title">Trading Analytics</span>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
      </div>

      <!-- Bot Selector -->
      <div class="sidebar-section">
        <label class="sidebar-label" for="botSelect">Bot</label>
        <select id="botSelect" class="sidebar-select">
          <!-- populated by JS -->
        </select>
      </div>

      <!-- Timeframe Selector -->
      <div class="sidebar-section">
        <label class="sidebar-label" for="timeframeSelect">Timeframe</label>
        <select id="timeframeSelect" class="sidebar-select">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>

      <!-- Viz Navigation -->
      <nav class="sidebar-nav" id="vizNav" aria-label="Visualization navigation">
        <div class="sidebar-label">Visualizations</div>
        <a href="#/dashboard" class="nav-item active" data-viz="dashboard">📋 KPI Overview</a>
        <a href="#/viz/equity-curve" class="nav-item" data-viz="equity-curve">📈 Equity Curve</a>
        <a href="#/viz/pnl-by-pair" class="nav-item" data-viz="pnl-by-pair">💱 P&L by Pair</a>
        <a href="#/viz/avg-trade-pnl" class="nav-item" data-viz="avg-trade-pnl">📊 Avg Trade P&L</a>
        <a href="#/viz/max-drawdown" class="nav-item" data-viz="max-drawdown">📉 Max Drawdown</a>
        <a href="#/viz/win-rate" class="nav-item" data-viz="win-rate">🎯 Win Rate</a>
        <a href="#/viz/profit-factor" class="nav-item" data-viz="profit-factor">⚡ Profit Factor</a>
        <a href="#/viz/sharpe" class="nav-item" data-viz="sharpe">📐 Sharpe Ratio</a>
        <a href="#/viz/trade-heatmap" class="nav-item" data-viz="trade-heatmap">🗺️ Trade Heatmap</a>
        <a href="#/compare" class="nav-item nav-item-compare" data-viz="compare">⚖️ Compare Bots</a>
      </nav>

      <!-- Theme Toggle -->
      <div class="sidebar-footer">
        <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle theme">
          <span id="themeIcon">☀️</span>
          <span id="themeLabel">Light</span>
        </button>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar (mobile hamburger) -->
      <header class="topbar">
        <button class="hamburger" id="hamburgerBtn" aria-label="Open menu">☰</button>
        <span class="topbar-title" id="topbarTitle">KPI Overview</span>
      </header>

      <!-- SPA Viewport -->
      <div id="app" class="app-viewport"></div>
    </main>
  </div>

  <!-- Scripts: theme init inlined for FOUC-prevention, then deferred -->
  <script>
    (function(){var t;try{t=localStorage.getItem('dashboard-theme')}catch(e){}if(!t)t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <script defer src="js/theme.js"></script>
  <script defer src="js/mock-data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.js"></script>
  <script defer src="js/landing-page.js"></script>
  <script defer src="js/compare.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
