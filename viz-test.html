<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Viz Module Test — A8-B15</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-primary: #FAFAF9; --bg-secondary: #F5F5F4; --bg-tertiary: #EFEFED;
      --text-primary: #1C1917; --text-secondary: #78716C; --text-muted: #A8A29E;
      --border-primary: #E7E5E4; --shadow-sm: 0 1px 2px rgba(28,25,23,.05); --shadow-md: 0 4px 8px rgba(28,25,23,.08);
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'SF Mono', 'Cascadia Code', monospace;
    }
    [data-theme="dark"] {
      --bg-primary: #111214; --bg-secondary: #1A1B1E; --bg-tertiary: #222326;
      --text-primary: #E8E8EC; --text-secondary: #9B9BA1; --text-muted: #A0A0A6;
      --border-primary: #2A2B2E; --shadow-sm: 0 1px 2px rgba(0,0,0,.2); --shadow-md: 0 4px 8px rgba(0,0,0,.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--sans); padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; }
    .card { background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 12px; padding: 16px; }
    .card-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
    .controls { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; max-width: 1200px; margin-left: auto; margin-right: auto; }
    .controls button { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border-primary); background: var(--bg-secondary); color: var(--text-primary); font-size: 12px; cursor: pointer; font-family: var(--sans); }
    .controls button.active { background: var(--text-primary); color: var(--bg-primary); }
    .theme-toggle { position: fixed; top: 16px; right: 16px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-primary); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; font-size: 14px; z-index: 100; }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  <div class="controls">
    <strong style="line-height:32px;margin-right:8px;font-size:13px;">Bot:</strong>
    <button class="active" data-bot="momentumAlpha" onclick="switchBot(this)">Momentum Alpha</button>
    <button data-bot="meanReverter" onclick="switchBot(this)">Mean Reverter</button>
    <button data-bot="scalpMaster" onclick="switchBot(this)">Scalp Master</button>
    <strong style="line-height:32px;margin-left:16px;margin-right:8px;font-size:13px;">TF:</strong>
    <button class="active" data-tf="daily" onclick="switchTf(this)">Daily</button>
    <button data-tf="weekly" onclick="switchTf(this)">Weekly</button>
    <button data-tf="monthly" onclick="switchTf(this)">Monthly</button>
  </div>
  <div class="grid">
    <div class="card"><div class="card-title">A8 — Correlation Matrix</div><div id="viz-a8"></div></div>
    <div class="card"><div class="card-title">A9 — Allocation Treemap</div><div id="viz-a9"></div></div>
    <div class="card"><div class="card-title">A10 — Signal Timeline</div><div id="viz-a10"></div></div>
    <div class="card"><div class="card-title">B11 — Win Rate Donut</div><div id="viz-b11"></div></div>
    <div class="card"><div class="card-title">B12 — Profit Factor Gauge</div><div id="viz-b12"></div></div>
    <div class="card"><div class="card-title">B13 — Max Drawdown Area</div><div id="viz-b13"></div></div>
    <div class="card"><div class="card-title">B14 — Sharpe Scorecard</div><div id="viz-b14"></div></div>
    <div class="card"><div class="card-title">B15 — Avg Trade P&L</div><div id="viz-b15"></div></div>
  </div>
  <script src="js/mock-data-mid.js"></script>
  <script src="js/viz-correlation-matrix.js"></script>
  <script src="js/viz-allocation-treemap.js"></script>
  <script src="js/viz-signal-timeline.js"></script>
  <script src="js/viz-win-rate-donut.js"></script>
  <script src="js/viz-profit-factor-gauge.js"></script>
  <script src="js/viz-max-drawdown-area.js"></script>
  <script src="js/viz-sharpe-scorecard.js"></script>
  <script src="js/viz-avg-trade-pnl.js"></script>
  <script>
    let currentBot = 'momentumAlpha', currentTf = 'daily';
    const botMap = { momentumAlpha: MockData.getMomentumAlpha(), meanReverter: MockData.getMeanReverter(), scalpMaster: MockData.getScalpMaster() };

    function getBotData() { return botMap[currentBot]; }

    function initAll() {
      const bd = getBotData();
      VizCorrelationMatrix.init(document.getElementById('viz-a8'), bd, currentTf);
      VizAllocationTreemap.init(document.getElementById('viz-a9'), bd, currentTf);
      VizSignalTimeline.init(document.getElementById('viz-a10'), bd, currentTf);
      VizWinRateDonut.init(document.getElementById('viz-b11'), bd, currentTf);
      VizProfitFactorGauge.init(document.getElementById('viz-b12'), bd, currentTf);
      VizMaxDrawdownArea.init(document.getElementById('viz-b13'), bd, currentTf);
      VizSharpeScorecard.init(document.getElementById('viz-b14'), bd, currentTf);
      VizAvgTradePnl.init(document.getElementById('viz-b15'), bd, currentTf);
    }

    function updateAll() {
      const bd = getBotData();
      VizCorrelationMatrix.update(bd, currentTf);
      VizAllocationTreemap.update(bd, currentTf);
      VizSignalTimeline.update(bd, currentTf);
      VizWinRateDonut.update(bd, currentTf);
      VizProfitFactorGauge.update(bd, currentTf);
      VizMaxDrawdownArea.update(bd, currentTf);
      VizSharpeScorecard.update(bd, currentTf);
      VizAvgTradePnl.update(bd, currentTf);
    }

    function switchBot(btn) {
      document.querySelectorAll('[data-bot]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentBot = btn.dataset.bot;
      updateAll();
    }

    function switchTf(btn) {
      document.querySelectorAll('[data-tf]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTf = btn.dataset.tf;
      updateAll();
    }

    function toggleTheme() {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
    }

    document.addEventListener('DOMContentLoaded', initAll);
  </script>
</body>
</html>
